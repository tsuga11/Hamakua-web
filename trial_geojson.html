<!DOCTYPE html>
<head>

<!-- Link to the leaflet css style sheets and javascript code, dowloaded from 
      http://leafletjs.com/download.html -->
<link rel="stylesheet" href="./leaflet/leaflet.css" />
<script src="./leaflet/leaflet.js"></script> 

<!-- Full screen control added using this script from https://github.com/brunob/leaflet.fullscreen -->
<link rel="stylesheet" href="./leaflet.fullscreen-master/Control.FullScreen.css" />
<script src="./leaflet.fullscreen-master/Control.FullScreen.js"></script>

<!-- Include the geojson file of important attributes
    Don't forget, you have to add "var cdp_restore_11 =" right at the very beginning of the .geojson file.
      Also, this onlys appears to work with a .geojson file. -->
<script src="cdp_restore_11.geojson" type="text/javascript"></script>

<style>
body {
            padding: 0;
            margin: 0;
        }
        html, body, #map {
            width: 100%;
            height: 600px;
        }
}
</style>
</head>
 
<body>
  
	<div id="map"></div>
<script>
 	var map = L.map('map',{
    fullscreenControl: true,
    fullscreenControlOptions:{
      position: 'topleft'
    }
 	}).setView([19.9,-155.2], 11);
 	
	L.tileLayer(
//    'http://{s}.www.toolserver.org/tiles/bw-mapnik/{z}/{x}/{y}.png', {
    'http://{s}.tile.stamen.com/toner/{z}/{x}/{y}.png', {
		attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
	}).addTo(map);

var geojson;
var info = L.control();
var legend = L.control({position: 'bottomright'});

// Color the hydroUnits using this custom color ramp!
function getColor_soe(d){
  return d > 0.75 ?  '#D73027' :
         d > 0.50 ?  '#F46D43' :
         d > 0.25 ?  '#FDAE61' :
         d > 0.00 ?  '#FEE090' :
         d > -0.25 ? '#E0F3F8' :
         d > -0.50 ? '#ABD9E9' :
         d > -0.75 ? '#74ADD1' :
                     '#4575B4';
}

// Style the polygons using the above color ramp and additional stable features.
function style(feature){
  return{
    weight: 0.5,
    opacity: 1,
    color: 'black',
    dashArray: '5',
    fillOpacity: 0.9,
    fillColor: getColor_soe(feature.properties.potential)
  };
}                                   

// Change the style when you rollover a polygn
function highlightFeature(e) {
    var layer = e.target;

    layer.setStyle({
        strokeWidth: '3px',
        strokeOpacity: 0.7,
        fillOpacity: 0.5
    });

    if (!L.Browser.ie && !L.Browser.opera) {
        layer.bringToFront();
    };
    info.update(layer.feature.properties);
}

// Reset the polygon style when you mouseout
function resetHighlight(e) {
    geojson.resetStyle(e.target);
    info.update();
}

// Zoom to features when you click on it
function zoomToFeature(e) {
    map.fitBounds(e.target.getBounds());
}

function onEachFeature(feature, layer) {
    layer.on({
        mouseover: highlightFeature,
        mouseout: resetHighlight,
        click: zoomToFeature
    });
}


info.onAdd = function (map) {
    this._div = L.DomUtil.create('div', 'info'); // create a div with a class "info"
    this.update();
    return this._div;
};

// method that we will use to update the control based on feature properties passed
info.update = function (props) {
    this._div.innerHTML = '<h4> Hydro subunit  </h4>' +  
    (props ? '<b>' + "ID: " + props.hydroUnit + '</b><br />' + 
    "Score: " + props.potential.toString().substring(0,5) 
        : 'Hover over a hydro subunit');
};


function getColor_soe(d){
  return d > 0.75 ?  '#D73027' :
         d > 0.50 ?  '#F46D43' :
         d > 0.25 ?  '#FDAE61' :
         d > 0.00 ?  '#FEE090' :
         d > -0.25 ? '#E0F3F8' :
         d > -0.50 ? '#ABD9E9' :
         d > -0.75 ? '#74ADD1' :
                     '#4575B4';
}
legend.onAdd = function (map) {

    var div = L.DomUtil.create('div', 'info legend'),
        //grades = [1, 0.75, 0.5, 0.25, 0, -0.25, -0.5, -0.75],
        cols = ["#D73027", "#F46D43", "#FDAE61", "#FEE090", "#E0F3F8", "#ABD9E9", "#74ADD1", "#4575B4"],
        labels = ['Extremely High','Very High', 'High', 'Moderately High', 'Moderately Low',
                                 'Low', 'Very Low', 'Extremely Low'];

    // loop through our density intervals and generate a label with a colored square for each interval
    for (var i = 0; i < cols.length; i++) {
        div.innerHTML +=
            '<i style="background:' + cols[i] + '"></i> ' +
            labels[i] + '<br>';
    }

    return div;
};





geojson = L.geoJson(cdp_restore_11, 
 {
    style: style,
    onEachFeature: onEachFeature
  }
).addTo(map);

info.addTo(map);

legend.addTo(map);

</script>
<div>
    <h1><b>Decision support tool for the management of Strawberry Guava in the North Hilo-Hamakua district of Hawaii</b></h1>
  </div>
</body>
</html>
